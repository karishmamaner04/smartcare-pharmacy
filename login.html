<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div style="max-width:400px;margin:80px auto;background:white;padding:30px;border-radius:15px;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,0.1);">

  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username" style="width:100%;padding:10px;margin:10px 0;">
  
  <input type="password" id="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

  <button onclick="login()">Login</button>

</div>

<script>
function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234"){
    localStorage.setItem("user", user);
    window.location.href = "index.html";
  } else {
    alert("Wrong Username or Password ❌");
  }
}
</script>

</body>
</html>
